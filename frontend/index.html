<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco de Dados Machado de Assis</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand__title">Banco de Dados Machado de Assis</div>
      <div class="brand__subtitle">Interface inicial inspirada no visual enxuto do LibGen</div>
    </div>

    <nav class="topnav" aria-label="Navegação principal">
      <button type="button" class="navbtn is-active">Acervo</button>
      <button type="button" class="navbtn" disabled>Créditos</button>
      <button type="button" class="navbtn" disabled>Criado por</button>
      <button type="button" class="navbtn" disabled>Outros acervos</button>
    </nav>
  </header>

  <main class="page">
    <section class="toolbar card">
      <div class="toolbar__row">
        <label class="field field--grow">
          <span>Busca geral</span>
          <input id="global-search" type="text" placeholder="Ex.: crônica, teatro, Machado de Assis" />
        </label>

        <label class="field">
          <span>Itens por página</span>
          <select id="page-size">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>

        <div class="toolbar__actions">
          <button id="apply-search" type="button">Buscar</button>
          <button id="clear-filters" type="button" class="btn-secondary">Limpar</button>
        </div>
      </div>

      <div class="toolbar__row toolbar__row--compact">
        <label class="toggle">
          <input id="toggle-extra" type="checkbox" />
          <span>Mostrar dados adicionais</span>
        </label>

        <label class="toggle">
          <input id="toggle-compact" type="checkbox" />
          <span>Modo compacto</span>
        </label>

        <label class="toggle">
          <input id="toggle-dated-only" type="checkbox" />
          <span>Somente registros com data</span>
        </label>

        <a class="admin-link" href="/admin/" target="_blank" rel="noreferrer">Entrar como administrador</a>
        <a class="admin-link admin-link--secondary" href="/admin/catalog/peca/" target="_blank" rel="noreferrer">Gerenciar peças</a>
      </div>
    </section>

    <section class="filters card">
      <div class="filters__grid">
        <label class="field">
          <span>Gênero</span>
          <select id="filter-genero">
            <option value="">Todos</option>
          </select>
        </label>

        <label class="field">
          <span>Assinatura</span>
          <select id="filter-assinatura">
            <option value="">Todas</option>
          </select>
        </label>

        <label class="field">
          <span>Instância</span>
          <select id="filter-instancia">
            <option value="">Todas</option>
          </select>
        </label>

        <label class="field">
          <span>Livro</span>
          <select id="filter-livro">
            <option value="">Todos</option>
          </select>
        </label>

        <label class="field">
          <span>Mídia</span>
          <select id="filter-midia">
            <option value="">Todas</option>
          </select>
        </label>
      </div>

      <div class="facets" id="facet-summary"></div>
    </section>

    <section class="results card">
      <div class="results__header">
        <div>
          <strong>Resultado</strong>
          <span id="results-summary" class="muted">Carregando...</span>
        </div>
        <div id="loading-indicator" class="muted">Consultando API...</div>
      </div>

      <div class="table-wrap">
        <table class="catalog-table" aria-describedby="results-summary">
          <thead>
            <tr>
              <th><button class="sort-btn" data-sort-key="id" type="button">Código <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="ano_publicacao" type="button">Ano <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="mes_publicacao" type="button">Mês <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="data_publicacao" type="button">Data <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="nome_obra" type="button">Nome da peça <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="assinatura" type="button">Assinatura <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="instancia" type="button">Instância <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="livro" type="button">Reunião em livro <span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" data-sort-key="genero" type="button">Gênero <span class="sort-indicator"></span></button></th>
            </tr>
            <tr class="filters-row">
              <th><input data-column-filter="id" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="ano_publicacao" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="mes_publicacao" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="data_publicacao" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="nome_obra" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="assinatura" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="instancia" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="livro" type="text" placeholder="Filtrar" /></th>
              <th><input data-column-filter="genero" type="text" placeholder="Filtrar" /></th>
            </tr>
          </thead>
          <tbody id="results-body">
            <tr>
              <td colspan="9" class="empty-state">Carregando registros...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prev-page" type="button" class="btn-secondary">Anterior</button>
        <span id="page-indicator">Página 1</span>
        <button id="next-page" type="button" class="btn-secondary">Próxima</button>
      </div>
    </section>
  </main>

  <dialog id="detail-modal" class="detail-modal">
    <div class="detail-modal__header">
      <h2 id="detail-title">Detalhes</h2>
      <button id="close-modal" type="button" class="btn-secondary">Fechar</button>
    </div>
    <div id="detail-content" class="detail-modal__content">
      <p class="muted">Selecione uma linha para ver mais informações.</p>
    </div>
  </dialog>

  <script>
    window.MACHADO_CONFIG = {
      apiBase: window.location.origin ? window.location.origin + '/api/v1' : '/api/v1'
    };
  </script>
  <script src="./app.js"></script>
</body>
</html>
